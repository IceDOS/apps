[icedos.applications.steam.headless-session]
excludeHostControllers = true # Keep host/physical controllers out of the headless Steam: launches Steam in a root-managed systemd scope (authorized via polkit) whose cgroup device policy denies all /dev/input + hidraw to the whole process tree (kernel-enforced, Steam's sandbox can't escape it); only the stream's own virtual pads are allowed back in. NOTE: the host's own paired pad is usually wanted ON the stream, so leave this off unless you specifically want host pads blocked from the stream.
isolateVirtualControllers = true # Hide the Sunshine virtual pad from the host desktop: udev strips its seat0 uaccess ACL so host games/compositor can't read it, while the injected Steam reaches it via a setgid-`input` wrapper. Stops the stream pad leaking into desktop games during an active stream.
hdr = true # Make the headless gamescope HDR-capable (builds the HDR/colorimetry gamescope patches). Whether a stream is actually HDR follows the Moonlight client's HDR toggle per-stream (like resolution): the client drives --hdr-enabled + DXVK_HDR on that stream. false = gamescope built without HDR patches, always SDR.
normalSteamSession = true # Inject the default "Steam" app into Sunshine (runs Steam with your normal HOME/account/library). Not injected when false.
secondarySteamSession = false # Inject a second "Steam (Second Session)" app that runs Steam under secondarySteamSessionPath as HOME — a fully separate account/library. Injected when true.
secondarySteamSessionPath = "" # HOME directory for the second session (e.g. "/home/ice/.steam-second"). REQUIRED (non-empty) when secondarySteamSession = true; Steam stores .steam/library/account under it.
sdrContentNits = 203 # luminance (nits) SDR content is shown at on the HDR output. 203 = BT.2408 reference white; higher = brighter SDR.
sdrGamutWideness = 0 # SDR→wide-gamut stretch on the HDR output: 0 = keep SDR in native sRGB/Rec.709 (accurate); 1 = stretch SDR to the display's full BT2020 gamut (vivid, oversaturated)
upscaleFilter = "" # gamescope upscaler (-F): fsr | nis | linear | nearest | pixel.
fsrSharpness = 20 # FSR/NIS sharpness: 0 = max sharp .. 20 = min sharp (gamescope default 2). NOTE: 20 = softest — lower it for a crisper upscale.
renderWidth = 0 # gamescope internal render width, upscaled to output resolution by `upscaleFilter`. 0 → render at output resolution (no upscale).
renderHeight = 0 # gamescope internal render height. 0 → render at output resolution.
steamOS = false # Enable Steam's SteamOS Deck UI mode (`steam -steamos3`): Steam manages the gamescope baselayer/focus natively, eliminating manual appid tagging. NOTE: in this mode Steam also takes over the host Bluetooth radio and powers it off on launch (intentional, flag-gated); the session re-asserts your pre-launch BT state as a workaround.
colorManagement = false # Enable color management controls in Steam's Display settings (Adjust Display Colors): color vibrance, color temperature sliders. Sets STEAM_GAMESCOPE_COLOR_MANAGED=1 + STEAM_GAMESCOPE_COLOR_TOYS=1 on the injected Steam. Requires the patched gamescope to function.
mangoApp = true # Enable the MangoHud performance overlay (mangoapp) in the headless session. Launches the idle gamescope with --mangoapp (gamescope spawns, respawns and composites the mangoapp overlay window) and sets STEAM_USE_MANGOAPP=1 on the injected Steam so the overlay level is toggled in-stream from Steam's Quick Access → Performance menu (levels 1-4). Off = no overlay. NOTE: --mangoapp is REQUIRED — without it gamescope never creates/composites the overlay, even though mangoapp runs.

[icedos.applications.steam.headless-session.desktop-capture]
enable = false # Stand up a SECOND, independent Sunshine instance that streams the REAL physical KDE Plasma (Wayland) desktop to Moonlight (the canonical "Desktop" app), coexisting with the headless gamescope Steam session. The headless instance is untouched (stays pinned to its private gamescope-0 portal); this one runs as a separate daemon on its own ports with its own pairing. A prep-cmd can't achieve this — one Sunshine daemon captures gamescope OR the real desktop, never both. false = no desktop instance.
name = "Desktop" # sunshine_name / mDNS name of the desktop instance. MUST differ from the primary headless instance so Moonlight can tell the two hosts apart.
port = 48989 # Base port for the desktop instance (primary uses 47989). Sunshine derives its whole TCP/UDP block from this; keep it clear of the primary's 479xx block. In Moonlight, add this host manually as IP:<port>.
backend = "portal" # Physical-desktop capture backend: "portal" = KDE Wayland ScreenCast via xdg-desktop-portal-kde (no CAP_SYS_ADMIN, no login-screen; the first stream shows a one-time KDE "share this screen" prompt on the physical display, then it is remembered). "kms" = raw DRM scanout incl. the login/lock screen (requires icedos.applications.sunshine.capSysAdmin = true).
openFirewall = true # Open the desktop instance's derived TCP/UDP port block in the host firewall. Turn off if you only reach it over Tailscale/LAN with no host firewall.
outputName = "" # Optional specific monitor/output to capture (mainly relevant to the kms backend). Empty = default (portal picker chooses).
